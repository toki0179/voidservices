services:
  voidservices-bot:
    image: ${BOT_IMAGE:-ghcr.io/toki0179/voidservices:latest}
    restart: unless-stopped
    init: true
    networks:
      - npm-bridge
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "voidservices-bot"
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      CLIENT_ID: ${CLIENT_ID:-}
      GUILD_ID: ${GUILD_ID:-}
      NODE_ENV: production
    volumes:
      - voidservices_data:/app/data
      - voidservices_logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  watchtower:
    image: nickfedor/watchtower:latest
    container_name: voidservices-watchtower
    restart: unless-stopped
    command:
      - --label-enable
      - --scope
      - voidservices-bot
      - --cleanup
      - --interval
      - "300"
      - --rolling-restart
    environment:
      REPO_USER: ${GHCR_USER:-}
      REPO_PASS: ${GHCR_TOKEN:-}
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_SCOPE: "voidservices-bot"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_NO_STARTUP_MESSAGE: "false"
      WATCHTOWER_WARN_ON_HEAD_FAILURE: "never"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  voidservices_data:
  voidservices_logs:

networks:
  npm-bridge:
    name: npm-bridge
    external: true
