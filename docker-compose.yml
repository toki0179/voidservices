services:
  voidbot:
    image: ${BOT_IMAGE:-ghcr.io/toki0179/voidservices:latest}
    container_name: voidservices-bot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      - GUILD_ID=${GUILD_ID}
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - com.centurylinklabs.watchtower.scope=voidservices
    networks:
      - voidservices-net
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1024M
        reservations:
          cpus: '1'
          memory: 512M

  watchtower:
    image: nickfedor/watchtower:latest
    container_name: voidservices-watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_SCOPE=voidservices
    command:
      - --label-enable
      - --scope
      - voidservices
      - --interval
      - "300"
      - --cleanup
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - voidservices-net

networks:
  voidservices-net:
    driver: bridge

volumes:
  data:
  logs:
